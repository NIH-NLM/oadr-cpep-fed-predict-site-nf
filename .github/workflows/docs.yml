name: Build and Deploy Sphinx Documentation

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install sphinx myst-parser sphinx-rtd-theme

      - name: Ensure docs directories exist
        run: mkdir -p docs/source/_static docs/source/_templates

      - name: Create README symlink
        run: ln -sf ../../README.md docs/source/README.md

      - name: Generate Nextflow module docs
        run: python3 docs/parse_nf_docs.py

      - name: Build Sphinx docs
        run: sphinx-build -b html docs/source docs/build/html

      - name: Verify build succeeded
        run: test -f docs/build/html/index.html

      - name: Create .nojekyll file
        run: touch docs/build/html/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs/build/html'

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
